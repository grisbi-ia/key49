<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Key49</title>
    <link rel="stylesheet" href="/css/pico.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            text-align: center;
            color: var(--pico-muted-color);
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1rem;
        }

        .auth-tabs button {
            flex: 1;
            border: 1px solid var(--pico-primary);
            background: transparent;
            color: var(--pico-primary);
            padding: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 0;
        }

        .auth-tabs button:first-child {
            border-radius: 0.25rem 0 0 0.25rem;
        }

        .auth-tabs button:last-child {
            border-radius: 0 0.25rem 0.25rem 0;
        }

        .auth-tabs button.active {
            background: var(--pico-primary);
            color: var(--pico-primary-inverse);
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
        }
    </style>
</head>

<body>
    <article class="login-card">
        <h2>Key49</h2>
        <p>Facturación Electrónica</p>
        {#if error == "invalid"}
        <p role="alert" style="color: var(--pico-del-color);">
            Credenciales inválidas o tenant inactivo
        </p>
        {/if}

        <div class="auth-tabs">
            <button type="button" id="tab-password" class="active" onclick="switchTab('password')">Email y Contraseña</button>
            <button type="button" id="tab-apikey" onclick="switchTab('apikey')">API Key</button>
        </div>

        <div id="panel-password" class="auth-panel active">
            <form method="post" action="/portal/login">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="usuario@empresa.com" autocomplete="email">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                <button type="submit">Ingresar</button>
            </form>
        </div>

        <div id="panel-apikey" class="auth-panel">
            <form method="post" action="/portal/login">
                <label for="api_key">API Key</label>
                <input type="password" id="api_key" name="api_key" placeholder="fec_test_..." autocomplete="off">
                <button type="submit">Ingresar</button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
            ¿No tiene cuenta? <a href="/portal/register">Registrarse</a>
        </p>
    </article>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
        }
    </script>
</body>

</html>
