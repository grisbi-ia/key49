<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Key49</title>
    <link rel="stylesheet" href="/css/pico.min.css">
    <style>
        :root {
            --pico-font-size: 15px;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            text-align: center;
            color: var(--pico-muted-color);
        }
    </style>
</head>

<body>
    <article class="login-card">
        <h2>Key49</h2>
        <p>Facturación Electrónica</p>
        {#if error == "invalid"}
        <p role="alert" style="color: var(--pico-del-color);">
            Credenciales inválidas o tenant inactivo
        </p>
        {/if}

        <form method="post" action="/portal/login">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="usuario@empresa.com" autocomplete="email">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
            <button type="submit">Ingresar</button>
        </form>

        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
            ¿No tiene cuenta? <a href="/portal/register">Registrarse</a>
        </p>
    </article>
</body>

</html>
