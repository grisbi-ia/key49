# Key49 — Infraestructura de desarrollo local
# Uso: docker compose up -d

services:
  # ── PostgreSQL (comentado: se usa instalación local en puerto 5433) ──
  # En PRODUCCIÓN: des-comentar este servicio o apuntar a un PostgreSQL gestionado.
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: key49-postgres
  #   environment:
  #     POSTGRES_DB: key49
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: 1234abcd
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - key49-pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d key49"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # ── PgBouncer: connection pooler en modo transaction ──
  # En desarrollo apunta al PostgreSQL local del host (host.docker.internal:5433).
  # En PRODUCCIÓN: cambiar pgbouncer.ini para apuntar al host de PostgreSQL real
  # y des-comentar depends_on si PostgreSQL corre como servicio Docker.
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    container_name: key49-pgbouncer
    # depends_on:          # Des-comentar en producción si PostgreSQL es servicio Docker
    #   postgres:
    #     condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "6432:6432"
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "psql -h 127.0.0.1 -p 6432 -U postgres -d key49 -c 'SELECT 1' > /dev/null 2>&1 || pg_isready -h 127.0.0.1 -p 6432"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: key49-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - key49-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:7-alpine
  #   container_name: key49-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - key49-redis:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  minio:
    image: minio/minio:latest
    container_name: key49-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - key49-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # key49-pgdata:    # Des-comentar si se usa PostgreSQL como servicio Docker
  key49-rabbitmq:
  # key49-redis:
  key49-minio:
