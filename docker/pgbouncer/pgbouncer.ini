;; Key49 — Configuración de PgBouncer
;; Modo transaction: conexiones se reusan entre transacciones.
;; Compatible con SET LOCAL search_path (scoped a cada transacción).

[databases]
;; Desarrollo: apunta al PostgreSQL local del host (puerto 5433).
;; Desde Docker, 'host.docker.internal' resuelve al host real.
;; Producción: cambiar a host=<postgresql-host> port=5432
key49 = host=host.docker.internal port=5433 dbname=key49

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Modo transaction: la conexión al servidor se asigna solo durante la transacción.
;; Al terminar la transacción, la conexión regresa al pool.
pool_mode = transaction

;; Límites de conexiones
max_client_conn = 200
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Timeouts
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 0
query_timeout = 0

;; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

;; Admin
admin_users = postgres
stats_users = postgres

;; Ignorar SET application_name (session-level, no compatible con transaction mode)
ignore_startup_parameters = extra_float_digits,application_name
