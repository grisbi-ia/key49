;; Key49 — PgBouncer Producción
;; Modo transaction: conexiones se reusan entre transacciones.
;; Compatible con SET LOCAL search_path (scoped a cada transacción).
;; Apunta al contenedor PostgreSQL en la red interna Docker.

[databases]
key49 = host=postgres port=5432 dbname=key49

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Modo transaction: la conexión al servidor se asigna solo durante la transacción.
pool_mode = transaction

;; Límites de conexiones
max_client_conn = 200
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Timeouts
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 0
query_timeout = 0

;; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

;; Admin
admin_users = key49
stats_users = key49

;; Ignorar SET application_name
ignore_startup_parameters = extra_float_digits,application_name
