# ╔══════════════════════════════════════════════════════╗
# ║  Traefik — Configuración Estática (Producción)      ║
# ╚══════════════════════════════════════════════════════╝

# Entrypoints
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# Let's Encrypt (ACME)
certificatesResolvers:
  letsencrypt:
    acme:
      email: "patriciovalarezo@gmail.com"
      storage: /letsencrypt/acme.json
      tlsChallenge: {}

# Proveedor: Docker (descubre contenedores automáticamente)
providers:
  docker:
    exposedByDefault: false
    network: key49-net
    watch: true

# API de Traefik (solo local)
api:
  dashboard: false
  insecure: false

# Logs
log:
  level: INFO

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Request-Id: keep
        X-Trace-Id: keep
