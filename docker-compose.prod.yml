# ╔══════════════════════════════════════════════════════════════╗
# ║  Key49 — Docker Compose de Producción                       ║
# ║  Dominio: key49.apx5.com                                    ║
# ║  Despliegue: docker compose -f docker-compose.prod.yml up -d║
# ╚══════════════════════════════════════════════════════════════╝

services:
  # ═══════════════════════════════════════════════════════════
  #  Traefik — Reverse Proxy + SSL automático
  # ═══════════════════════════════════════════════════════════
  traefik:
    image: traefik:v3.7
    container_name: key49-traefik
    restart: unless-stopped
    command:
      - "--configfile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - key49-letsencrypt:/letsencrypt
    networks:
      - key49-net
    environment:
      - KEY49_ACME_EMAIL=${KEY49_ACME_EMAIL}
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════
  #  Key49 — Aplicación Quarkus
  # ═══════════════════════════════════════════════════════════
  key49:
    build:
      context: .
      dockerfile: Dockerfile.jvm
    image: key49:${KEY49_VERSION:-latest}
    container_name: key49-app
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - QUARKUS_MAILER_MOCK=true
      # Storage: apunta a MinIO en la red interna
      - KEY49_STORAGE_ENDPOINT=http://minio:9000
      - KEY49_STORAGE_ACCESS_KEY=${KEY49_MINIO_ROOT_USER}
      - KEY49_STORAGE_SECRET_KEY=${KEY49_MINIO_ROOT_PASSWORD}
    networks:
      - key49-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.key49.rule=Host(`${KEY49_DOMAIN}`)"
      - "traefik.http.routers.key49.entrypoints=websecure"
      - "traefik.http.routers.key49.tls=true"
      - "traefik.http.routers.key49.tls.certresolver=letsencrypt"
      - "traefik.http.services.key49.loadbalancer.server.port=8080"
      - "traefik.http.services.key49.loadbalancer.healthcheck.path=/q/health/ready"
      - "traefik.http.services.key49.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.key49.loadbalancer.healthcheck.timeout=5s"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ═══════════════════════════════════════════════════════════
  #  PostgreSQL 16 — Base de Datos
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: key49-postgres
    restart: unless-stopped
    shm_size: 256MB
    environment:
      POSTGRES_DB: ${KEY49_DB_NAME}
      POSTGRES_USER: ${KEY49_DB_USER}
      POSTGRES_PASSWORD: ${KEY49_DB_PASSWORD}
      # Tuning para PostgreSQL en VPS
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - key49-pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./docker/postgres/init-prod.sh:/docker-entrypoint-initdb.d/00-init-prod.sh:ro
    networks:
      - key49-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEY49_DB_USER} -d ${KEY49_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ═══════════════════════════════════════════════════════════
  #  PgBouncer — Connection Pooler
  # ═══════════════════════════════════════════════════════════
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: key49-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${KEY49_DB_NAME}
      DB_USER: ${KEY49_DB_USER}
      DB_PASSWORD: ${KEY49_DB_PASSWORD}
      # Pool sizing
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "25"
      RESERVE_POOL_SIZE: "5"
      # Admin
      ADMIN_USERS: ${KEY49_DB_USER}
    volumes:
      - ./docker/pgbouncer/pgbouncer.prod.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.prod.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - key49-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${KEY49_DB_USER} -d ${KEY49_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══════════════════════════════════════════════════════════
  #  Redis 7 — Cache y Rate Limiting
  # ═══════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: key49-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${KEY49_REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - key49-redis:/data
    networks:
      - key49-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${KEY49_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ═══════════════════════════════════════════════════════════
  #  RabbitMQ 3.13 — Mensajería
  # ═══════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: key49-rabbitmq
    restart: unless-stopped
    hostname: key49-rabbit
    environment:
      RABBITMQ_DEFAULT_USER: ${KEY49_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${KEY49_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - key49-rabbitmq:/var/lib/rabbitmq
    networks:
      - key49-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ═══════════════════════════════════════════════════════════
  #  MinIO — Almacenamiento S3
  # ═══════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: key49-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${KEY49_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${KEY49_MINIO_ROOT_PASSWORD}
    volumes:
      - key49-minio:/data
    networks:
      - key49-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ═══════════════════════════════════════════════════════════
  #  MinIO Client — Crear bucket al iniciar
  # ═══════════════════════════════════════════════════════════
  minio-init:
    image: minio/mc:latest
    container_name: key49-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${KEY49_MINIO_ROOT_USER} ${KEY49_MINIO_ROOT_PASSWORD} --api s3v4;
      mc mb --ignore-existing local/${KEY49_STORAGE_BUCKET};
      echo 'Bucket ${KEY49_STORAGE_BUCKET} ready';
      exit 0;
      "
    networks:
      - key49-net

networks:
  key49-net:
    name: key49-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  key49-pgdata:
    name: key49-pgdata
  key49-redis:
    name: key49-redis
  key49-rabbitmq:
    name: key49-rabbitmq
  key49-minio:
    name: key49-minio
  key49-letsencrypt:
    name: key49-letsencrypt
