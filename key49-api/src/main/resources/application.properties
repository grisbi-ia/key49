# Key49 — Configuración Principal

# ── Base de datos ──
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=${KEY49_DB_USER:postgres}
%dev.quarkus.datasource.password=${KEY49_DB_PASSWORD:1234abcd}
%dev.quarkus.datasource.reactive.url=${KEY49_DB_REACTIVE_URL:postgresql://localhost:5433/key49}
%prod.quarkus.datasource.username=${KEY49_DB_USER}
%prod.quarkus.datasource.password=${KEY49_DB_PASSWORD}
%prod.quarkus.datasource.reactive.url=${KEY49_DB_REACTIVE_URL}

# Sin migraciones automáticas (ejecución manual por DBA)
quarkus.hibernate-orm.database.generation=none
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# ── Bean discovery para módulos internos (Reactive Messaging necesita Jandex) ──
quarkus.index-dependency.key49-queue.group-id=auracore.key49
quarkus.index-dependency.key49-queue.artifact-id=key49-queue
quarkus.index-dependency.key49-notify.group-id=auracore.key49
quarkus.index-dependency.key49-notify.artifact-id=key49-notify

# ── RabbitMQ connection ──
rabbitmq-host=${KEY49_RABBITMQ_HOST:localhost}
rabbitmq-port=${KEY49_RABBITMQ_PORT:5672}
rabbitmq-username=${KEY49_RABBITMQ_USER:guest}
rabbitmq-password=${KEY49_RABBITMQ_PASSWORD:guest}

# ── RabbitMQ channels: outgoing (producers) ──
mp.messaging.outgoing.doc-sign-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.doc-sign-out.exchange.name=key49.documents
mp.messaging.outgoing.doc-sign-out.exchange.type=topic
mp.messaging.outgoing.doc-sign-out.exchange.durable=true
mp.messaging.outgoing.doc-sign-out.default-routing-key=doc.sign

mp.messaging.outgoing.doc-send-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.doc-send-out.exchange.name=key49.documents
mp.messaging.outgoing.doc-send-out.exchange.type=topic
mp.messaging.outgoing.doc-send-out.exchange.durable=true
mp.messaging.outgoing.doc-send-out.default-routing-key=doc.send

mp.messaging.outgoing.doc-authorize-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.doc-authorize-out.exchange.name=key49.documents
mp.messaging.outgoing.doc-authorize-out.exchange.type=topic
mp.messaging.outgoing.doc-authorize-out.exchange.durable=true
mp.messaging.outgoing.doc-authorize-out.default-routing-key=doc.authorize

mp.messaging.outgoing.doc-notify-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.doc-notify-out.exchange.name=key49.documents
mp.messaging.outgoing.doc-notify-out.exchange.type=topic
mp.messaging.outgoing.doc-notify-out.exchange.durable=true
mp.messaging.outgoing.doc-notify-out.default-routing-key=doc.notify

# ── RabbitMQ channels: incoming (consumers) ──
mp.messaging.incoming.doc-sign-in.connector=smallrye-rabbitmq
mp.messaging.incoming.doc-sign-in.exchange.name=key49.documents
mp.messaging.incoming.doc-sign-in.exchange.type=topic
mp.messaging.incoming.doc-sign-in.queue.name=key49.sign
mp.messaging.incoming.doc-sign-in.queue.durable=true
mp.messaging.incoming.doc-sign-in.routing-keys=doc.sign

mp.messaging.incoming.doc-send-in.connector=smallrye-rabbitmq
mp.messaging.incoming.doc-send-in.exchange.name=key49.documents
mp.messaging.incoming.doc-send-in.exchange.type=topic
mp.messaging.incoming.doc-send-in.queue.name=key49.send
mp.messaging.incoming.doc-send-in.queue.durable=true
mp.messaging.incoming.doc-send-in.routing-keys=doc.send

mp.messaging.incoming.doc-authorize-in.connector=smallrye-rabbitmq
mp.messaging.incoming.doc-authorize-in.exchange.name=key49.documents
mp.messaging.incoming.doc-authorize-in.exchange.type=topic
mp.messaging.incoming.doc-authorize-in.queue.name=key49.authorize
mp.messaging.incoming.doc-authorize-in.queue.durable=true
mp.messaging.incoming.doc-authorize-in.routing-keys=doc.authorize

mp.messaging.incoming.doc-notify-in.connector=smallrye-rabbitmq
mp.messaging.incoming.doc-notify-in.exchange.name=key49.documents
mp.messaging.incoming.doc-notify-in.exchange.type=topic
mp.messaging.incoming.doc-notify-in.queue.name=key49.notify
mp.messaging.incoming.doc-notify-in.queue.durable=true
mp.messaging.incoming.doc-notify-in.routing-keys=doc.notify

mp.messaging.incoming.doc-dlq-in.connector=smallrye-rabbitmq
mp.messaging.incoming.doc-dlq-in.exchange.name=key49.dlq
mp.messaging.incoming.doc-dlq-in.exchange.type=fanout
mp.messaging.incoming.doc-dlq-in.queue.name=key49.dlq
mp.messaging.incoming.doc-dlq-in.queue.durable=true

# ── Redis ──
quarkus.redis.hosts=${KEY49_REDIS_URL:redis://localhost:6379}

# ── SRI ──
key49.sri.environment=${KEY49_SRI_ENVIRONMENT:test}
key49.sri.reception-timeout-ms=${KEY49_SRI_RECEPTION_TIMEOUT_MS:3000}
key49.sri.authorization-timeout-ms=${KEY49_SRI_AUTHORIZATION_TIMEOUT_MS:5000}
key49.sri.max-retries=${KEY49_SRI_MAX_RETRIES:6}

# ── Zona horaria Ecuador ──
key49.timezone=${KEY49_TIMEZONE:America/Guayaquil}

# ── Outbox Poller ──
key49.outbox.poll-interval=${KEY49_OUTBOX_POLL_INTERVAL:500ms}
key49.outbox.batch-size=${KEY49_OUTBOX_BATCH_SIZE:50}

# ── Retry Poller ──
key49.retry.poll-interval=${KEY49_RETRY_POLL_INTERVAL:5s}

# ── MinIO / S3 Storage ──
key49.storage.endpoint=${KEY49_STORAGE_ENDPOINT:http://localhost:9000}
key49.storage.access-key=${KEY49_STORAGE_ACCESS_KEY:minioadmin}
key49.storage.secret-key=${KEY49_STORAGE_SECRET_KEY:minioadmin}
key49.storage.bucket=${KEY49_STORAGE_BUCKET:key49-documents}
key49.storage.region=${KEY49_STORAGE_REGION:us-east-1}

# ── Email / SMTP ──
quarkus.mailer.from=${KEY49_EMAIL_FROM:facturacion@key49.ec}
quarkus.mailer.host=${KEY49_SMTP_HOST:localhost}
quarkus.mailer.port=${KEY49_SMTP_PORT:1025}
quarkus.mailer.username=${KEY49_SMTP_USER:}
quarkus.mailer.password=${KEY49_SMTP_PASSWORD:}
quarkus.mailer.start-tls=${KEY49_SMTP_START_TLS:DISABLED}
quarkus.mailer.ssl=${KEY49_SMTP_SSL:false}
quarkus.mailer.mock=%dev.true
%test.quarkus.mailer.mock=true
key49.email.from=${KEY49_EMAIL_FROM:facturacion@key49.ec}
key49.email.enabled=${KEY49_EMAIL_ENABLED:true}

# ── Webhooks ──
key49.webhook.connect-timeout-ms=${KEY49_WEBHOOK_CONNECT_TIMEOUT_MS:5000}
key49.webhook.read-timeout-ms=${KEY49_WEBHOOK_READ_TIMEOUT_MS:10000}
key49.webhook.enabled=${KEY49_WEBHOOK_ENABLED:true}

# ── Alertas ──
key49.alerts.enabled=${KEY49_ALERTS_ENABLED:true}
key49.alerts.email-recipients=${KEY49_ALERTS_EMAIL_RECIPIENTS:}
key49.alerts.webhook-url=${KEY49_ALERTS_WEBHOOK_URL:}
key49.alerts.webhook-secret=${KEY49_ALERTS_WEBHOOK_SECRET:}
key49.alerts.reminder-interval=${KEY49_ALERTS_REMINDER_INTERVAL:4h}
key49.alerts.sri-timeout=${KEY49_ALERTS_SRI_TIMEOUT:5m}
key49.alerts.dlq-threshold=${KEY49_ALERTS_DLQ_THRESHOLD:0}
key49.alerts.cert-expiry-days=${KEY49_ALERTS_CERT_EXPIRY_DAYS:30}
key49.alerts.error-rate-percent=${KEY49_ALERTS_ERROR_RATE_PERCENT:5}
key49.alerts.queue-depth-max=${KEY49_ALERTS_QUEUE_DEPTH_MAX:1000}
key49.alerts.rabbitmq-api-url=${KEY49_ALERTS_RABBITMQ_API_URL:http://localhost:15672/api/queues/%2F/key49.dlq}
key49.alerts.rabbitmq-api-base-url=${KEY49_ALERTS_RABBITMQ_API_BASE_URL:http://localhost:15672/api/queues/%2F}
%test.key49.alerts.enabled=false

# ── Jackson ──
quarkus.jackson.property-naming-strategy=SNAKE_CASE
quarkus.jackson.write-dates-as-timestamps=false

# ── HTTP ──
quarkus.http.port=8080
%dev.quarkus.http.cors.origins=/.*/
%test.quarkus.http.cors.origins=/.*/
%prod.quarkus.http.cors.origins=${KEY49_CORS_ORIGINS:https://app.key49.ec,https://portal.key49.ec}
%prod.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%prod.quarkus.http.cors.headers=Authorization,Content-Type,X-Idempotency-Key,X-Document-Type
%prod.quarkus.http.cors.exposed-headers=X-Request-Id,X-Trace-Id,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset
%prod.quarkus.http.cors.access-control-max-age=24H

# ── HSTS (solo producción, requiere TLS en el reverse proxy) ──
%prod.quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains
%prod.quarkus.http.header."Strict-Transport-Security".methods=GET,POST,PUT,DELETE

# ── Graceful shutdown ──
quarkus.shutdown.timeout=30s

# ── OpenAPI ──
quarkus.smallrye-openapi.info-title=Key49 API
quarkus.smallrye-openapi.info-version=${quarkus.application.version}
quarkus.smallrye-openapi.info-description=API de facturación electrónica para Ecuador (SRI)

# ── Multi-tenancy ──
# Schema-per-tenant: search_path set per request via TenantConnectionManager
# No built-in Hibernate multi-tenancy (not supported with Reactive)

# ── DevServices (solo dev/test) ──
%dev.quarkus.devservices.enabled=true
%test.quarkus.devservices.enabled=true
%prod.quarkus.devservices.enabled=false

# ── Logs ──
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) traceId=%X{traceId} spanId=%X{spanId} %s%e%n
quarkus.log.level=INFO
%dev.quarkus.log.category."auracore.key49".level=DEBUG

# ── OpenTelemetry ──
quarkus.otel.enabled=true
quarkus.otel.service.name=key49
quarkus.otel.traces.exporter=${KEY49_OTEL_TRACES_EXPORTER:none}
quarkus.otel.exporter.otlp.endpoint=${KEY49_OTEL_ENDPOINT:http://localhost:4317}
%dev.quarkus.otel.traces.exporter=none
%test.quarkus.otel.traces.exporter=none
%prod.quarkus.otel.traces.exporter=${KEY49_OTEL_TRACES_EXPORTER:otlp}
